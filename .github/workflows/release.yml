name: Release to crates.io

# Read dev_docs/release.md for more information.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and validate the release without publishing"
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-release:
    name: Verify Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release_meta.outputs.version }}
      tag_name: ${{ steps.release_meta.outputs.tag_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.91.1

      - name: Verify release metadata
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" != "true" ]; then
            echo "::error::Manual runs are dry-run only. Push a v* tag to publish."
            exit 1
          fi

          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "dela") | .version')
          TAG_NAME="v${VERSION}"

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          make release_verify \
            RELEASE_VERIFY_EXPECT_TAG="${TAG_NAME}" \
            RELEASE_VERIFY_SKIP_TAG_EXISTS=1 \
            RELEASE_VERIFY_SKIP_CRATES_CHECK=1 \
            RELEASE_VERIFY_SKIP_TESTS=1

  lint-and-unit-tests:
    name: Lint And Unit Tests
    needs: verify-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.91.1
          components: rustfmt, clippy

      - name: Run lint
        run: make lint

      - name: Run unit tests
        run: make tests

  integration-tests:
    name: Integration Tests
    needs: verify-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run shell integration tests
        env:
          VERBOSE: 1
          DOCKER_PLATFORM: linux/amd64
        run: make tests_integration

  package-check:
    name: Cargo Publish Dry Run
    needs: verify-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.91.1

      - name: Validate publish package
        run: cargo publish --dry-run --locked

  build-artifacts:
    name: Build ${{ matrix.archive_name }}
    needs: [verify-release, lint-and-unit-tests, integration-tests, package-check]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive_name: dela-linux-amd64.tar.gz
            artifact_name: dela-linux-amd64
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            archive_name: dela-linux-arm64.tar.gz
            artifact_name: dela-linux-arm64
            linker: aarch64-linux-gnu-gcc
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_name: dela-darwin-amd64.tar.gz
            artifact_name: dela-darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_name: dela-darwin-arm64.tar.gz
            artifact_name: dela-darwin-arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.91.1
          targets: ${{ matrix.target }}

      - name: Install Linux cross-compilation tools
        if: runner.os == 'Linux' && matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binary
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Prepare archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          cp "target/${{ matrix.target }}/release/dela" .
          tar czf "${{ matrix.archive_name }}" dela

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ./${{ matrix.archive_name }}
          if-no-files-found: error

  create-draft-release:
    name: Create Draft GitHub Release
    needs: [verify-release, build-artifacts]
    if: ${{ github.event_name == 'push' && github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.verify-release.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            IS_DRAFT=$(gh release view "${TAG_NAME}" --json draft --jq .draft)
            if [ "${IS_DRAFT}" = "true" ]; then
              echo "Draft release ${TAG_NAME} already exists."
              exit 0
            else
              echo "Error: Published release ${TAG_NAME} already exists. Refusing to operate on a published release."
              exit 1
            fi
          fi

          make release_notes

          gh release create "${TAG_NAME}" \
            --draft \
            --verify-tag \
            --title "${TAG_NAME}" \
            --notes-file release_notes.md

  upload-release-assets:
    name: Upload Draft Release Assets
    needs: [verify-release, build-artifacts, create-draft-release]
    if: ${{ github.event_name == 'push' && github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download built archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload assets to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.verify-release.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "${TAG_NAME}" dist/* --clobber

  publish-crate:
    name: Publish To Crates.io
    needs: [verify-release, build-artifacts, upload-release-assets]
    if: ${{ github.event_name == 'push' && github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.91.1

      - name: Check whether version is already published
        id: crates_version
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ needs.verify-release.outputs.version }}"
          RESPONSE=$(curl --fail --silent --location https://crates.io/api/v1/crates/dela || true)

          if [ -n "${RESPONSE}" ] && echo "${RESPONSE}" | jq -e --arg version "${VERSION}" '.versions[] | select(.num == $version)' >/dev/null; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish crate
        if: steps.crates_version.outputs.exists != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

  publish-github-release:
    name: Publish GitHub Release
    needs: [verify-release, publish-crate]
    if: ${{ github.event_name == 'push' && github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.verify-release.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_ID=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}" --jq .id)
          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
            -F draft=false
